name: HC e2e-healthy-cameras

on: push

jobs:
  e2e-electron:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'adopt'
      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Start Docker
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_on: error
          timeout_seconds: 2400
          command: |
            make dcup-full-isolated-action

      - name: Docker Startup Fail!
        if: failure()
        run: |
          make docker-logs

      - name: Run Cypress
        run: make cypress-electron

      - name: Cypress Fail!
        if: failure()
        run: |
          make docker-logs

